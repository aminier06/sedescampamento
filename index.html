<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Campamento</title>

<style>
body { font-family: Arial; background:#f4f6f9; padding:20px; }
.container { max-width:1000px; margin:auto; background:white; padding:25px; border-radius:10px; }

.header { display:flex; gap:15px; align-items:center; }
.logo { width:110px; }

.seccion { border:1px solid #ddd; padding:15px; margin-top:20px; }

input,select { width:100%; padding:8px; margin-top:5px; }

button { margin-top:10px; padding:10px; background:#198754; color:white; border:none; }

.facilitador { border:1px solid #ccc; padding:10px; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="logo.png" class="logo">
<div>
<h2>Campamento Aprender es Divertido</h2>
<p>Registro oficial por distrito</p>
</div>
</div>

<form id="form">

<div class="seccion">

<select id="regional"></select>
<select id="distrito"></select>

<input id="responsable" placeholder="Responsable">
<input id="telefono" placeholder="Teléfono">
<input id="correo" placeholder="Correo">

</div>

<div class="seccion">

<h3>Sede principal</h3>

<input id="s1Centro" placeholder="Centro">
<input id="s1Est" placeholder="Estudiantes">
<input id="s1Grp" placeholder="Grupos">

<input id="c1Nom" placeholder="Coordinador">
<input id="c1Ced" placeholder="Cédula">
<input id="c1Tel" placeholder="Teléfono">

<div id="fac1"></div>
<button type="button" onclick="addFac(1)">+ Facilitador</button>

</div>

<button type="button" onclick="showS2()">+ Sede adicional</button>

<div id="sede2" class="seccion" style="display:none">

<h3>Sede adicional</h3>

<input id="s2Centro">
<input id="s2Est">
<input id="s2Grp">

<input id="c2Nom">
<input id="c2Ced">
<input id="c2Tel">

<div id="fac2"></div>
<button type="button" onclick="addFac(2)">+ Facilitador</button>

</div>

<button type="submit">Enviar</button>

</form>

</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbyGTmdgnBZp2CS6ogKe4HNTcHlL-Flwex_RAlkOPLeKA_XIWDdzZ_7sf75vMzVzmJ78/exec";

const catalogo={
"09 - MAO":["0901 - MAO","0902 - ESPERANZA"],
"08 - SANTIAGO":["0803 - SANTIAGO"]
};

const r=document.getElementById("regional");
const d=document.getElementById("distrito");

Object.keys(catalogo).forEach(x=>r.innerHTML+=`<option>${x}</option>`);

r.onchange=()=>{
d.innerHTML="";
catalogo[r.value].forEach(x=>d.innerHTML+=`<option>${x}</option>`);
};

function addFac(s){
const div=document.createElement("div");
div.className="facilitador";

div.innerHTML=`
<input placeholder="Nombre">
<input placeholder="Cédula">
<input placeholder="Teléfono">
<input placeholder="Centro">
`;

document.getElementById("fac"+s).appendChild(div);
}

function getFac(s){
let arr=[];
document.querySelectorAll("#fac"+s+" .facilitador").forEach(b=>{
let i=b.querySelectorAll("input");
arr.push({
nombre:i[0].value,
cedula:i[1].value,
telefono:i[2].value,
centroLabora:i[3].value
});
});
return arr;
}

function showS2(){
document.getElementById("sede2").style.display="block";
}

document.getElementById("form").onsubmit=e=>{
e.preventDefault();

if(!r.value||!d.value||!s1Centro.value){
alert("Faltan datos");
return;
}

const sedes=[{
tipoSede:"Principal",
centroSede:s1Centro.value,
cantidadEstudiantes:s1Est.value,
cantidadGrupos:s1Grp.value,
coordinador:{
nombre:c1Nom.value,
cedula:c1Ced.value,
telefono:c1Tel.value
},
facilitadores:getFac(1)
}];

if(document.getElementById("sede2").style.display==="block"){
sedes.push({
tipoSede:"Adicional",
centroSede:s2Centro.value,
cantidadEstudiantes:s2Est.value,
cantidadGrupos:s2Grp.value,
coordinador:{
nombre:c2Nom.value,
cedula:c2Ced.value,
telefono:c2Tel.value
},
facilitadores:getFac(2)
});
}

const fd=new FormData();
fd.append("payload",JSON.stringify({
regional:r.value,
distrito:d.value,
responsable:responsable.value,
telefono:telefono.value,
correo:correo.value,
sedes:sedes
}));

fetch(URL,{method:"POST",mode:"no-cors",body:fd});

alert("Enviado correctamente");
};

</script>

</body>
</html>
